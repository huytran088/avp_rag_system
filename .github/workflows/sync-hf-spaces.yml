name: Sync to HF Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare HF README
        run: cp hf-space/README.md README.md
      - name: Configure git credentials
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git config credential.helper store
          echo "https://BeefStewBibi:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
      - name: Commit and push to HF Spaces
        run: |
          git add README.md
          git commit -m "chore: set HF Spaces README" --allow-empty
          git push https://huggingface.co/spaces/BeefStewBibi/avp-rag-system main:main --force
