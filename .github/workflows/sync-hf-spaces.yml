name: Sync to HF Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cp hf-space/README.md README.md
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add README.md
          git commit -m "chore: set HF Spaces README" --allow-empty
          git push https://BeefStewBibi:${HF_TOKEN}@huggingface.co/spaces/BeefStewBibi/avp-rag-system main:main --force
